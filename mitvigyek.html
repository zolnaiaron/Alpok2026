<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mit hozz magaddal?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            color: #ffffff;
            overflow: hidden; /* Itt nem kell görgetni */
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        
        .background-image.active { opacity: 1; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 80px auto;
            padding: 30px;
            background-color: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2.2rem; margin-bottom: 30px; }
        ul { list-style: none; padding: 0; }
        li { font-size: 1.2rem; line-height: 1.8; margin-bottom: 10px; }
        strong { color: #ffd700; }
        
        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.3s;
        }

        .back-button:hover { background-color: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <div class="background-container">
        <div id="bg1" class="background-image"></div>
        <div id="bg2" class="background-image"></div>
    </div>
    <div class="overlay"></div>

    <div class="container">
        <h1>Mit hozz magaddal? 🎒</h1>
        <ul>
            <li>Kényelmes ruhák</li>
            <li><strong>Túrázós ruha, túracipő (fontos!)</strong></li>
            <li>Matrac, hálózsák</li>
            <li>Fürdőruha, törölköző</li>
            <li>Pizsama (az unikornisos is 🦄)</li>
            <li>Fogkefe, tisztálkodási szerek</li>
        </ul>
        <a href="index.html" class="back-button">Vissza a főoldalra</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const images = ["hegy1.jpg", "hegy2.jpg", "hegy3.jpg", "hegy4.jpg"];
            let currentImageIndex = 0;
            let xPos = 0;
            const bg1 = document.getElementById("bg1");
            const bg2 = document.getElementById("bg2");
            let activeBackground = bg1;
            let inactiveBackground = bg2;
        
            activeBackground.style.backgroundImage = `url(${images[currentImageIndex]})`;
            activeBackground.classList.add('active');
        
            function animateBackground() {
                xPos -= 0.1;
                activeBackground.style.backgroundPosition = `${xPos}px 0`;
                if (Math.abs(xPos) >= window.innerWidth - 200) {
                    currentImageIndex = (currentImageIndex + 1) % images.length;
                    inactiveBackground.style.backgroundImage = `url(${images[currentImageIndex]})`;
                    activeBackground.classList.remove('active');
                    inactiveBackground.classList.add('active');
                    const temp = activeBackground;
                    activeBackground = inactiveBackground;
                    inactiveBackground = temp;
                    xPos = 0;
                }
                requestAnimationFrame(animateBackground);
            }
            animateBackground();
        });
    </script>
</body>
</html>
